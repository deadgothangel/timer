<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEADGOTHANGEL | PROJECT 222</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; text-transform: uppercase; }
        
        /* Исправленный фон */
        .background { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: url('background.jpg') center center no-repeat; 
            background-size: cover; 
            filter: blur(5px) brightness(0.5); 
            z-index: -1; 
        }
        
        .marquee { position: absolute; width: 100%; background: rgba(0,0,0,0.8); border-top: 1px solid #333; border-bottom: 1px solid #333; padding: 10px 0; font-size: 14px; letter-spacing: 5px; white-space: nowrap; overflow: hidden; z-index: 100; }
        .top { top: 30px; }
        .bottom { bottom: 70px; }
        .marquee div { display: flex; width: 200%; animation: scroll 15s linear infinite; }
        .marquee span { width: 50%; display: flex; justify-content: space-around; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* Таймер с двоеточиями */
        .timer-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; z-index: 50; }
        #display { font-size: 2.5rem; font-weight: bold; display: flex; align-items: center; gap: 10px; text-shadow: 0 0 20px rgba(255, 0, 0, 0.7); }
        .dots { padding-bottom: 15px; }
        .unit { font-size: 10px; margin-top: 5px; opacity: 0.5; letter-spacing: 2px; text-align: center; }

        #music-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; cursor: pointer; transition: 0.5s; }
        .play-btn { width: 70px; height: 70px; border: 2px solid #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-bottom: 25px; animation: pulse 2s infinite; }
        .play-btn::after { content: ''; display: block; width: 0; height: 0; border-top: 12px solid transparent; border-bottom: 12px solid transparent; border-left: 20px solid #fff; margin-left: 8px; }
        .tap-text { letter-spacing: 5px; font-size: 16px; font-weight: bold; animation: blink 1.5s infinite; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.4); } 70% { box-shadow: 0 0 0 15px rgba(255,255,255,0); } 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .bottom-bar { position: fixed; bottom: 20px; width: 90%; left: 5%; display: flex; justify-content: space-between; align-items: center; z-index: 200; font-size: 11px; letter-spacing: 1px; opacity: 0.8; }
        #mute-btn { cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>
    <div class="background"></div>
    
    <div id="music-overlay">
        <div class="play-btn"></div>
        <div class="tap-text">ТЫ УВЕРЕН???</div>
    </div>

    <div class="marquee top">
        <div>
            <span>DEADGOTHANGEL DEADGOTHANGEL DEADGOTHANGEL</span>
            <span>DEADGOTHANGEL DEADGOTHANGEL DEADGOTHANGEL</span>
        </div>
    </div>

    <div class="timer-container">
        <div style="font-size: 12px; letter-spacing: 8px; margin-bottom: 20px; color: #ff0000; font-weight: bold;">СУДНЫЙ ДЕНЬ</div>
        <div id="display">
            <div><span id="d">14</span><div class="unit">DAYS</div></div>
            <div class="dots">:</div>
            <div><span id="h">00</span><div class="unit">HOURS</div></div>
            <div class="dots">:</div>
            <div><span id="m">00</span><div class="unit">MIN</div></div>
            <div class="dots">:</div>
            <div><span id="s">00</span><div class="unit">SEC</div></div>
        </div>
    </div>

    <div class="marquee bottom">
        <div>
            <span>DEADGOTHANGEL DEADGOTHANGEL DEADGOTHANGEL</span>
            <span>DEADGOTHANGEL DEADGOTHANGEL DEADGOTHANGEL</span>
        </div>
    </div>

    <div class="bottom-bar">
        <div id="song-name">DEADGOTHANGEL — DОЖДЬ</div>
        <div id="mute-btn">🔊</div>
    </div>

    <audio id="bgMusic" loop src="Project_222.mp3"></audio>

    <script>
        const musicOverlay = document.getElementById('music-overlay');
        const bgMusic = document.getElementById('bgMusic');
        const muteBtn = document.getElementById('mute-btn');
        let timeLeft = 14 * 24 * 60 * 60;

        function updateDisplay() {
            const d = Math.floor(timeLeft / (3600*24));
            const h = Math.floor((timeLeft % (3600*24)) / 3600);
            const m = Math.floor((timeLeft % 3600) / 60);
            const s = timeLeft % 60;
            document.getElementById('d').innerText = d < 10 ? '0'+d : d;
            document.getElementById('h').innerText = h < 10 ? '0'+h : h;
            document.getElementById('m').innerText = m < 10 ? '0'+m : m;
            document.getElementById('s').innerText = s < 10 ? '0'+s : s;
        }

        musicOverlay.addEventListener('click', () => {
            bgMusic.play().catch(e => console.log("Play failed"));
            musicOverlay.style.opacity = '0';
            setTimeout(() => musicOverlay.style.display = 'none', 500);
            setInterval(() => { if (timeLeft > 0) { timeLeft--; updateDisplay(); } }, 1000);
        });

        muteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            bgMusic.muted = !bgMusic.muted;
            muteBtn.innerText = bgMusic.muted ? '🔇' : '🔊';
        });

        updateDisplay();
    </script>
</body>
</html>
